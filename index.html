<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSA Sales Cheat Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
--bg:#0F0F13;--bg2:#16161C;--bg3:#1E1E26;--card:#1A1A22;
--border:#2A2A36;--border2:#3A3A48;
--text:#E8E8F0;--text2:#9898B0;--text3:#6868808;
--radius:12px;--radius-sm:8px;
--franco:#FF4444;--mowilex:#22C997;--volk:#4A9EFF;
--sterlyn:#FF8C42;--bayer:#4CAF50;--cotto:#5B9BD5;
--dos:#26BFA8;--rucika:#FF6B35;--kansai:#E84040;
--drymix:#C4976A;--arsi:#A855F7;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;overflow-x:hidden}

/* TOP BAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(15,15,19,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 16px}
.topbar-inner{max-width:1400px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.topbar-row1{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.app-title{font-size:13px;font-weight:700;color:var(--text2);letter-spacing:2px;text-transform:uppercase;white-space:nowrap}
.search-wrap{flex:1;min-width:180px;position:relative}
.search-wrap input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 12px 8px 36px;border-radius:var(--radius-sm);font-size:13px;font-family:'Space Grotesk',sans-serif;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--border2)}
.search-wrap input::placeholder{color:var(--text2)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text2)}
.topbar-btns{display:flex;gap:6px;flex-shrink:0}
.btn-mode{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:7px 12px;border-radius:var(--radius-sm);font-size:11px;font-weight:600;cursor:pointer;font-family:'Space Grotesk',sans-serif;white-space:nowrap;transition:all .2s;letter-spacing:.5px}
.btn-mode:hover,.btn-mode.active{background:var(--border2);color:var(--text)}
.btn-mode.highlight{background:#22C99720;border-color:#22C997;color:#22C997}

/* BRAND TABS */
.brand-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.brand-tabs::-webkit-scrollbar{display:none}
.brand-tab{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .2s;letter-spacing:.3px;white-space:nowrap}
.brand-tab.all{background:var(--bg3);border-color:var(--border2);color:var(--text)}
.brand-tab.all.active{background:var(--text);color:var(--bg)}

/* MAIN */
.main{max-width:1400px;margin:0 auto;padding:16px}
.results-info{font-size:11px;color:var(--text2);margin-bottom:12px;font-family:'DM Mono',monospace}

/* GRID */
.grid{display:grid;gap:10px;grid-template-columns:1fr}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s;position:relative}
.card:hover{border-color:var(--border2)}
.card-accent{height:3px;width:100%}
.card-top{padding:12px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:10px}
.card-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.card-main{flex:1;min-width:0}
.card-header{display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.card-name{font-size:13px;font-weight:700;line-height:1.3;color:var(--text)}
.badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.5px;font-family:'DM Mono',monospace;white-space:nowrap}
.badge-bs{background:#FFD70020;color:#FFD700;border:1px solid #FFD70040}
.badge-bun{background:#22C99720;color:#22C997;border:1px solid #22C99740}
.badge-warn{background:#FF444420;color:#FF8080;border:1px solid #FF444440}
.card-kw{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;line-height:1.4}
.card-sub{font-size:10px;color:var(--text2);margin-top:2px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.card-chevron{font-size:12px;color:var(--text2);flex-shrink:0;transition:transform .2s;margin-top:3px}
.card.open .card-chevron{transform:rotate(180deg)}

/* CARD DETAIL */
.card-detail{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.card.open .card-detail{display:block}
.detail-sp{font-size:12px;color:var(--text);line-height:1.6;margin-bottom:10px;padding-top:10px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.detail-item{background:var(--bg3);border-radius:var(--radius-sm);padding:7px 9px}
.detail-label{font-size:9px;font-weight:700;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;font-family:'DM Mono',monospace}
.detail-val{font-size:11px;color:var(--text);line-height:1.4}
.detail-tip{background:var(--bg3);border-left:3px solid;border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:8px 10px;font-size:11px;color:var(--text);line-height:1.5;margin-top:4px}
.detail-warn{background:#FF444410;border:1px solid #FF444430;border-radius:var(--radius-sm);padding:7px 10px;font-size:11px;color:#FF9090;margin-top:6px;line-height:1.4}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-text{font-size:14px}

/* DESKTOP */
@media(min-width:768px){
.grid{grid-template-columns:repeat(2,1fr)}
.topbar-row1{flex-wrap:nowrap}
}
@media(min-width:1100px){
.grid.desktop-wide{grid-template-columns:repeat(3,1fr)}
}
@media(min-width:1400px){
.grid.desktop-wide{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

let currentBrand='all';
let currentMode='ringkas';
let desktopMode=false;
let searchTerm='';

function init(){
  const tabs=document.getElementById('brandTabs');
  let html=`<div class="brand-tab all active" data-brand="all" onclick="filterBrand('all')">Semua (${PRODUCTS.length})</div>`;
  BRANDS.forEach(b=>{
    const count=PRODUCTS.filter(p=>p.brand===b.id).length;
    html+=`<div class="brand-tab" data-brand="${b.id}" style="border-color:${b.color}20;color:${b.color}" onclick="filterBrand('${b.id}')">${b.label} (${count})</div>`;
  });
  tabs.innerHTML=html;
  render();
  document.getElementById('searchInput').addEventListener('input',e=>{
    searchTerm=e.target.value.toLowerCase();
    render();
  });
}

function filterBrand(id){
  currentBrand=id;
  document.querySelectorAll('.brand-tab').forEach(t=>{
    t.classList.toggle('active',t.dataset.brand===id);
  });
  render();
}

function setMode(m){
  currentMode=m;
  document.getElementById('btnRingkas').classList.toggle('active',m==='ringkas');
  document.getElementById('btnDetail').classList.toggle('active',m==='detail');
  if(m==='detail'){
    document.querySelectorAll('.card').forEach(c=>c.classList.add('open'));
  } else {
    document.querySelectorAll('.card').forEach(c=>c.classList.remove('open'));
  }
}

function toggleDesktop(){
  desktopMode=!desktopMode;
  const btn=document.getElementById('btnDesktop');
  const grid=document.getElementById('grid');
  btn.classList.toggle('highlight',desktopMode);
  grid.classList.toggle('desktop-wide',desktopMode);
  btn.textContent=desktopMode?'📱':'🖥';
}

function getBrandColor(brandId){
  return BRANDS.find(b=>b.id===brandId)?.color||'#888';
}

function render(){
  let filtered=PRODUCTS.filter(p=>{
    const matchBrand=currentBrand==='all'||p.brand===currentBrand;
    const q=searchTerm;
    const matchSearch=!q||
      p.name.toLowerCase().includes(q)||
      p.kw.toLowerCase().includes(q)||
      p.brand.toLowerCase().includes(q)||
      p.cat.toLowerCase().includes(q)||
      p.sp.toLowerCase().includes(q)||
      (p.tip&&p.tip.toLowerCase().includes(q));
    return matchBrand&&matchSearch;
  });

  document.getElementById('resultsInfo').textContent=
    `Menampilkan ${filtered.length} dari ${PRODUCTS.length} produk${searchTerm?' — hasil pencarian: "'+searchTerm+'"':''}`;

  const grid=document.getElementById('grid');
  if(filtered.length===0){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div><div class="empty-text">Produk tidak ditemukan. Coba kata kunci lain.</div></div>`;
    return;
  }

  grid.innerHTML=filtered.map((p,i)=>{
    const color=getBrandColor(p.brand);
    const isOpen=currentMode==='detail';
    const badgeHtml=p.badges.map(b=>{
      if(b==='bs') return '<span class="badge badge-bs">🔥 BEST SELLER</span>';
      if(b==='bun') return '<span class="badge badge-bun">🔗 BUNDLING</span>';
      return '';
    }).join('');

    return `
<div class="card${isOpen?' open':''}" id="card-${i}">
  <div class="card-accent" style="background:${color}"></div>
  <div class="card-top" onclick="toggleCard(${i})">
    <div class="card-icon">${p.icon}</div>
    <div class="card-main">
      <div class="card-sub">${p.brand.toUpperCase()} · ${p.cat}</div>
      <div class="card-name">${p.name}</div>
      <div class="badges">${badgeHtml}</div>
      <div class="card-kw" style="margin-top:5px">${p.kw.split('·').map(k=>`<span style="color:${color};opacity:.85">◆</span> ${k.trim()}`).join(' ')}</div>
    </div>
    <div class="card-chevron">▼</div>
  </div>
  <div class="card-detail">
    <div class="detail-sp">${p.sp}</div>
    <div class="detail-grid">
      <div class="detail-item">
        <div class="detail-label">Target Market</div>
        <div class="detail-val">${p.target||'-'}</div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Channel</div>
        <div class="detail-val">${p.channel||'-'}</div>
      </div>
    </div>
    ${p.tip?`<div class="detail-tip" style="border-color:${color}"><strong>💡 Tips Lapangan:</strong> ${p.tip}</div>`:''}
    ${p.warn?`<div class="detail-warn">⚠️ ${p.warn}</div>`:''}
  </div>
</div>`;
  }).join('');
}

function toggleCard(i){
  const card=document.getElementById('card-'+i);
  card.classList.toggle('open');
}

init();
</script>
