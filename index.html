<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Product Knowledge CSAP — MT Panel</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="app/styles.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="app/data.js"></script>
</head>

<body>
<div id="root"></div>

<script type="text/babel" src="app/atoms.jsx"></script>
<script type="text/babel" src="app/views_home.jsx"></script>
<script type="text/babel" src="app/views_playbook.jsx"></script>
<script type="text/babel" src="app/views_admin.jsx"></script>

<script type="text/babel">
const { DIVISIONS: NAV_DIVS, BRANDS: NAV_BRANDS, PRODUCTS: NAV_PRODUCTS } = window.CSAP_DATA;

// ─── NAV ──────────────────────────────────────────────
const NAV = [
  { id: 'home',     label: 'Home',         icon: 'home' },
  { id: 'catalog',  label: 'Katalog',      icon: 'catalog' },
  { id: 'playbook', label: 'Playbook',     icon: 'playbook' },
  { id: 'spek',     label: 'Spek Keramik', icon: 'spek' },
  { id: 'admin',    label: 'Admin',        icon: 'admin' }
];

// ─── TOPBAR ───────────────────────────────────────────
const Topbar = ({ route, onRoute, onOpenCmd, onToggleMobile, mobileOpen, onSearch, query }) => (
  <header className="topbar">
    <button className="icon-btn topbar-mobile-toggle" onClick={onToggleMobile} style={{ display: mobileOpen ? 'none' : 'grid' }}>
      <Icon name="menu" size={16} />
    </button>
    <button onClick={() => onRoute({ name: 'home' })} className="brand">
      <div className="brand-mark">CS</div>
      <div className="brand-text">
        <div className="brand-title">Product Knowledge</div>
        <div className="brand-sub">CSAP · Building Mat.</div>
      </div>
    </button>

    <nav className="topbar-nav">
      {NAV.map(n => (
        <button key={n.id} onClick={() => onRoute({ name: n.id })}
          className={'topbar-link' + (route.name === n.id ? ' active' : '')}>
          <Icon name={n.icon} size={14} />{n.label}
        </button>
      ))}
    </nav>

    <div className="topbar-right">
      <button className="cmdk" onClick={onOpenCmd}>
        <Icon name="search" size={14} className="muted" />
        <span style={{ color: 'var(--ink-3)', fontSize: 13, flex: 1, textAlign: 'left' }}>
          {query || 'Cari brand, produk, playbook…'}
        </span>
        <span className="mono" style={{
          fontSize: 11, color: 'var(--ink-3)', padding: '2px 6px',
          background: 'var(--paper-2)', border: '1px solid var(--hair)', borderRadius: 4
        }}>⌘K</span>
      </button>
      <button className="icon-btn"><Icon name="bell" size={15} /><span className="dot" /></button>
      <button className="icon-btn"><Icon name="help" size={15} /></button>
      <div style={{
        width: 30, height: 30, borderRadius: 99,
        background: 'var(--accent)', color: 'var(--paper)',
        display: 'grid', placeItems: 'center',
        fontFamily: 'Inter Tight', fontWeight: 700, fontSize: 12,
        marginLeft: 4
      }}>YH</div>
    </div>
  </header>
);

// ─── MOBILE DRAWER NAV ────────────────────────────────
const MobileNav = ({ open, onClose, route, onRoute }) => (
  <Drawer open={open} onClose={onClose} width={300}>
    <div style={{ padding: '18px 20px', borderBottom: '1px solid var(--hair)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <div className="brand-mark">CS</div>
        <div>
          <div style={{ fontWeight: 600, fontSize: 13.5, fontFamily: 'Inter Tight' }}>Product Knowledge</div>
          <div style={{ fontSize: 11, color: 'var(--ink-3)' }}>CSAP · MT Panel</div>
        </div>
      </div>
      <button className="icon-btn" onClick={onClose}><Icon name="x" size={16} /></button>
    </div>
    <div style={{ padding: 12, overflowY: 'auto' }}>
      {NAV.map(n => (
        <button key={n.id} onClick={() => { onRoute({ name: n.id }); onClose(); }}
          style={{
            width: '100%', padding: '12px 14px',
            display: 'flex', alignItems: 'center', gap: 12,
            fontSize: 14, fontWeight: route.name === n.id ? 600 : 500,
            color: route.name === n.id ? 'var(--ink)' : 'var(--ink-2)',
            background: route.name === n.id ? 'var(--paper-2)' : 'transparent',
            borderRadius: 'var(--r-m)',
            textAlign: 'left',
            transition: 'var(--t-q)'
          }}>
          <Icon name={n.icon} size={16} /> {n.label}
        </button>
      ))}
      <div style={{ height: 1, background: 'var(--hair)', margin: '14px 8px' }} />
      <div style={{ padding: '10px 14px', fontSize: 11, fontWeight: 600, color: 'var(--ink-4)', textTransform: 'uppercase', letterSpacing: '.08em', marginBottom: 4 }}>
        Divisi
      </div>
      {NAV_DIVS.map(d => (
        <button key={d.no} onClick={() => { onRoute({ name: 'catalog', params: { division: d.no } }); onClose(); }}
          style={{
            width: '100%', padding: '10px 14px',
            display: 'flex', alignItems: 'center', gap: 10,
            fontSize: 13,
            color: 'var(--ink-2)',
            borderRadius: 'var(--r-m)',
            textAlign: 'left'
          }}>
          <span style={{ width: 6, height: 6, borderRadius: 99, background: `var(--div${d.no})` }} />
          <span style={{ flex: 1 }}>D{d.no} · {d.short}</span>
          <span className="mono" style={{ fontSize: 11, color: 'var(--ink-4)' }}>{d.title.split(' ').slice(-1)[0]}</span>
        </button>
      ))}
    </div>
  </Drawer>
);

// ─── COMMAND PALETTE ──────────────────────────────────
const CommandPalette = ({ open, onClose, onRoute, onOpenBrand, onOpenProduct, query: externalQuery }) => {
  const [q, setQ] = useState('');
  const [cursor, setCursor] = useState(0);
  const inputRef = useRef(null);
  useEffect(() => {
    if (open) {
      setTimeout(() => inputRef.current?.focus(), 20);
      setQ(externalQuery || '');
      setCursor(0);
    }
  }, [open]);

  const items = useMemo(() => {
    const res = [];
    // Pages
    NAV.forEach(n => res.push({
      kind: 'page', id: n.id, title: n.label, sub: 'Pindah ke halaman', icon: n.icon,
      action: () => onRoute({ name: n.id })
    }));
    // Divisions
    NAV_DIVS.forEach(d => res.push({
      kind: 'div', id: 'd' + d.no, title: 'Divisi ' + d.no + ' · ' + d.title, sub: d.tagline, icon: 'layers',
      action: () => onRoute({ name: 'catalog', params: { division: d.no } })
    }));
    // Brands
    NAV_BRANDS.forEach(b => res.push({
      kind: 'brand', id: 'b-' + b.id, title: b.label, sub: b.category + ' · D' + b.division, icon: 'bookmark',
      action: () => onOpenBrand(b.id)
    }));
    // Products (first ~60)
    NAV_PRODUCTS.slice(0, 80).forEach(p => res.push({
      kind: 'prod', id: 'p-' + p.id, title: p.name, sub: p.code + ' · ' + p.series, icon: 'catalog',
      action: () => onOpenProduct(p)
    }));
    if (!q.trim()) return res.slice(0, 8);
    const qL = q.toLowerCase();
    return res.filter(x => x.title.toLowerCase().includes(qL) || (x.sub || '').toLowerCase().includes(qL)).slice(0, 40);
  }, [q]);

  useEffect(() => { setCursor(0); }, [q]);
  useEffect(() => {
    if (!open) return;
    const k = e => {
      if (e.key === 'ArrowDown') { e.preventDefault(); setCursor(c => Math.min(c + 1, items.length - 1)); }
      if (e.key === 'ArrowUp')   { e.preventDefault(); setCursor(c => Math.max(c - 1, 0)); }
      if (e.key === 'Enter' && items[cursor]) { items[cursor].action(); onClose(); }
    };
    window.addEventListener('keydown', k);
    return () => window.removeEventListener('keydown', k);
  }, [open, items, cursor]);

  if (!open) return null;
  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, zIndex: 120,
      background: 'rgba(23,23,15,.45)', backdropFilter: 'blur(4px)',
      display: 'flex', justifyContent: 'center', alignItems: 'flex-start',
      padding: '12vh 20px 20px'
    }}>
      <div onClick={e => e.stopPropagation()} className="fade-up" style={{
        width: '100%', maxWidth: 620,
        background: 'var(--surface)',
        border: '1px solid var(--hair)',
        borderRadius: 'var(--r-xl)',
        boxShadow: 'var(--sh-3)',
        overflow: 'hidden'
      }}>
        <div style={{
          display: 'flex', alignItems: 'center', gap: 12,
          padding: '14px 18px',
          borderBottom: '1px solid var(--hair)'
        }}>
          <Icon name="search" size={16} className="muted" />
          <input
            ref={inputRef}
            value={q}
            onChange={e => setQ(e.target.value)}
            placeholder="Cari brand, produk, playbook, halaman…"
            style={{ border: 'none', outline: 'none', flex: 1, fontSize: 15, background: 'transparent' }}
          />
          <span className="mono" style={{
            fontSize: 10.5, color: 'var(--ink-3)',
            padding: '3px 8px', background: 'var(--paper-2)',
            border: '1px solid var(--hair)', borderRadius: 4
          }}>ESC</span>
        </div>
        <div style={{ maxHeight: 420, overflowY: 'auto' }}>
          {items.length === 0 && (
            <div style={{ padding: '40px 20px', textAlign: 'center', color: 'var(--ink-3)', fontSize: 13 }}>
              Tidak ada hasil untuk "<strong>{q}</strong>"
            </div>
          )}
          {items.map((it, i) => (
            <button key={it.id} onClick={() => { it.action(); onClose(); }}
              onMouseEnter={() => setCursor(i)}
              style={{
                width: '100%',
                display: 'flex', alignItems: 'center', gap: 12,
                padding: '10px 18px',
                textAlign: 'left',
                fontSize: 13.5,
                background: cursor === i ? 'var(--paper-2)' : 'transparent',
                transition: 'background .08s',
                cursor: 'pointer'
              }}>
              <div style={{
                width: 30, height: 30, borderRadius: 'var(--r-s)',
                background: 'var(--surface)', border: '1px solid var(--hair)',
                display: 'grid', placeItems: 'center',
                color: 'var(--ink-2)', flexShrink: 0
              }}>
                <Icon name={it.icon} size={14} />
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 600, letterSpacing: '-.005em', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{it.title}</div>
                <div style={{ fontSize: 12, color: 'var(--ink-3)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{it.sub}</div>
              </div>
              <span className="badge" style={{ fontSize: 10, textTransform: 'uppercase' }}>{it.kind}</span>
              {cursor === i && <Icon name="arrow" size={13} className="muted" />}
            </button>
          ))}
        </div>
        <div style={{
          padding: '10px 18px', borderTop: '1px solid var(--hair)',
          fontSize: 11, color: 'var(--ink-3)', display: 'flex', gap: 18, alignItems: 'center',
          background: 'var(--paper-2)'
        }}>
          <span><span className="mono" style={{ background: 'var(--surface)', padding: '1px 5px', borderRadius: 3, border: '1px solid var(--hair)' }}>↑↓</span> navigasi</span>
          <span><span className="mono" style={{ background: 'var(--surface)', padding: '1px 5px', borderRadius: 3, border: '1px solid var(--hair)' }}>↵</span> buka</span>
          <span style={{ marginLeft: 'auto' }}>{items.length} hasil</span>
        </div>
      </div>
    </div>
  );
};

// ─── APP ──────────────────────────────────────────────
const App = () => {
  const [route, setRoute] = useState(() => {
    try { return JSON.parse(localStorage.getItem('csap_route')) || { name: 'home' }; }
    catch { return { name: 'home' }; }
  });
  const [product, setProduct] = useState(null);
  const [cmdOpen, setCmdOpen] = useState(false);
  const [mobileOpen, setMobileOpen] = useState(false);
  const [query, setQuery] = useState('');

  useEffect(() => { localStorage.setItem('csap_route', JSON.stringify(route)); }, [route]);

  useEffect(() => {
    const h = e => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        setCmdOpen(o => !o);
      }
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  const goTo = (name, params) => { setRoute({ name, params }); setQuery(''); };
  const openBrand = id => setRoute({ name: 'catalog', params: { brandId: id } });
  const openProduct = p => setProduct(p);

  return (
    <ToastProvider>
      <Topbar
        route={route}
        onRoute={setRoute}
        onOpenCmd={() => setCmdOpen(true)}
        onToggleMobile={() => setMobileOpen(true)}
        mobileOpen={mobileOpen}
        query={query}
      />

      <MobileNav open={mobileOpen} onClose={() => setMobileOpen(false)} route={route} onRoute={setRoute} />

      <main className="main">
        {route.name === 'home'     && <HomeView     onGo={goTo} onOpenBrand={openBrand} />}
        {route.name === 'catalog'  && <CatalogView  initial={route.params} onOpenBrand={openBrand} onOpenProduct={openProduct} query={query} />}
        {route.name === 'playbook' && <PlaybookView initial={route.params} />}
        {route.name === 'spek'     && <SpekView />}
        {route.name === 'admin'    && <AdminView />}
      </main>

      <ProductDrawer product={product} open={!!product} onClose={() => setProduct(null)} />

      <CommandPalette
        open={cmdOpen}
        onClose={() => setCmdOpen(false)}
        onRoute={setRoute}
        onOpenBrand={openBrand}
        onOpenProduct={openProduct}
      />

      {/* Floating Cmd+K hint on desktop only (mobile uses search icon) */}
    </ToastProvider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
